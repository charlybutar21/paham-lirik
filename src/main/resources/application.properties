# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:paham_lirik}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Jakarta
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# AI Config
ai.provider=${AI_PROVIDER:gemini}
ai.gemini.api-key=${GEMINI_API_KEY:}
ai.gemini.model=gemini-2.0-flash
ai.openai.api-key=${OPENAI_API_KEY:}
ai.openai.model=gpt-4o-mini

# Timeout
ai.request.timeout=60000
